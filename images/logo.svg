<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="textFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="50%" stop-color="#fdd835"/>
      <stop offset="100%" stop-color="#fbc02d"/>
    </linearGradient>
    <linearGradient id="carBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="100%" stop-color="#fbc02d"/>
    </linearGradient>
  </defs>

  <!-- XOTIC AUTO SOUND text — uses textLength to lock width regardless of available font -->
  <text x="400" y="120"
        text-anchor="middle"
        font-family="'Arial Black', 'Helvetica', Impact, sans-serif"
        font-weight="900"
        font-style="italic"
        font-size="120"
        fill="url(#textFill)"
        stroke="#ffffff"
        stroke-width="4"
        paint-order="stroke fill"
        textLength="740"
        lengthAdjust="spacingAndGlyphs"
        letter-spacing="2">XOTIC AUTO SOUND</text>

  <!-- Stylized sports car silhouette -->
  <g transform="translate(400, 250)">
    <!-- Car shadow -->
    <ellipse cx="0" cy="70" rx="220" ry="7" fill="#000" opacity="0.45"/>

    <!-- Car body main outline -->
    <path d="M-220 35 Q-208 -3 -160 -10 L-115 -32 Q-65 -50 0 -52 Q70 -52 130 -38 L175 -22 Q210 -14 218 22 L220 44 Q220 56 204 56 L160 56 Q152 70 134 70 Q116 70 110 56 L-110 56 Q-116 70 -134 70 Q-152 70 -160 56 L-204 56 Q-220 56 -220 46 Z"
          fill="#0a0a0a" stroke="#fdd835" stroke-width="2.5"/>

    <!-- Yellow main panel -->
    <path d="M-198 30 Q-175 6 -125 -6 L-75 -22 Q-25 -36 25 -36 Q85 -36 130 -26 L168 -12 Q195 -6 205 18 L205 35 L-198 35 Z"
          fill="url(#carBody)"/>

    <!-- Black middle stripe -->
    <path d="M-185 22 L-40 -20 L50 -25 L140 -10 L188 10 L-185 10 Z"
          fill="#0a0a0a"/>

    <!-- Yellow lower curves -->
    <path d="M-185 16 L-160 8 L-60 -10 L25 -18 L100 -14 L172 -2 L-185 -2 Z"
          fill="url(#carBody)"/>

    <!-- Windshield -->
    <path d="M-85 -15 L-60 -34 L25 -40 L70 -34 L70 -15 Z"
          fill="#0d0d0d" stroke="#ffffff" stroke-width="1.5" opacity="0.85"/>

    <!-- Rear window -->
    <path d="M75 -15 L75 -34 L120 -26 L155 -12 Z"
          fill="#0d0d0d" stroke="#ffffff" stroke-width="1.2" opacity="0.85"/>

    <!-- Front wheel -->
    <circle cx="-130" cy="56" r="26" fill="#0a0a0a" stroke="#fdd835" stroke-width="3"/>
    <circle cx="-130" cy="56" r="16" fill="#1a1a1a"/>
    <g transform="translate(-130, 56)">
      <rect x="-2" y="-14" width="4" height="28" fill="#666" rx="1"/>
      <rect x="-14" y="-2" width="28" height="4" fill="#666" rx="1"/>
      <rect x="-2" y="-14" width="4" height="28" fill="#666" rx="1" transform="rotate(45)"/>
      <rect x="-2" y="-14" width="4" height="28" fill="#666" rx="1" transform="rotate(-45)"/>
      <circle cx="0" cy="0" r="3.5" fill="#fdd835"/>
    </g>

    <!-- Rear wheel -->
    <circle cx="134" cy="56" r="26" fill="#0a0a0a" stroke="#fdd835" stroke-width="3"/>
    <circle cx="134" cy="56" r="16" fill="#1a1a1a"/>
    <g transform="translate(134, 56)">
      <rect x="-2" y="-14" width="4" height="28" fill="#666" rx="1"/>
      <rect x="-14" y="-2" width="28" height="4" fill="#666" rx="1"/>
      <rect x="-2" y="-14" width="4" height="28" fill="#666" rx="1" transform="rotate(45)"/>
      <rect x="-2" y="-14" width="4" height="28" fill="#666" rx="1" transform="rotate(-45)"/>
      <circle cx="0" cy="0" r="3.5" fill="#fdd835"/>
    </g>

    <!-- Headlight -->
    <ellipse cx="-208" cy="22" rx="7" ry="5" fill="#ffffff" opacity="0.95"/>

    <!-- Taillight -->
    <rect x="195" y="14" width="16" height="7" rx="1.5" fill="#e53935"/>
  </g>
</svg>
